<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ass57 - Button Group_Radio</title>
    <!--เรียกใช้ Bootstarp จาก Folder Bootstarpที่โหลดมา-->
    <link href="bootstrap-5.1.0-dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="bootstrap-5.1.0-dist/js/bootstrap.bundle.min.js"></script>

    <!-- เรียกใช้ Bootstarp จาก CDN (Content Delivery Network) (icon https://icons.getbootstrap.com)
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">

     -->
</head>

<body class="p-4 text-center">
    <div class="mb-2">เลือกขนาด: </div>
    <div class="btn-group" role="group">
        <input type="radio" id="r1" class="btn-check" name="fruit" value="Small">
        <label for="r1" class="btn btn-outline-primary">Small</label>
        <input type="radio" id="r2" class="btn-check" name="fruit" value="Medium">
        <label for="r2" class="btn btn-outline-primary">Medium</label>
        <input type="radio" id="r3" class="btn-check" name="fruit" value="Large">
        <label for="r3" class="btn btn-outline-primary">Large</label>
    </div>
</body>

</html>
