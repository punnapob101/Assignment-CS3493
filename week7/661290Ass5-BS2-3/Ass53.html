<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ass53 - Form Checkbox</title>
    <!--เรียกใช้ Bootstarp จาก Folder Bootstarpที่โหลดมา-->
    <link href="bootstrap-5.1.0-dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="bootstrap-5.1.0-dist/js/bootstrap.bundle.min.js"></script>

    <!-- เรียกใช้ Bootstarp จาก CDN (Content Delivery Network) (icon https://icons.getbootstrap.com)
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
     -->
</head>

<body>
    <form class="m-3">
        <h6>ผลไม้ที่ชอบ</h6>
        <div class="form-check">
            <input type="checkbox" class="form-check-input" id="cb1">
            <label for="cb1" class="form-label mb-1">Apple</label>
        </div>
        <div class="form-check">
            <input type="checkbox" class="form-check-input" id="cb2">
            <label for="cb2" class="form-label mb-1">Banana</label>
        </div>
        <div class="form-check">
            <input type="checkbox" class="form-check-input" id="cb3">
            <label for="cb3" class="form-label mb-1">Coconut</label>
        </div>
    </form>
</body>

</html>
