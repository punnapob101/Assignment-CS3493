<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ass56 - Form Switch</title>
    <!--เรียกใช้ Bootstarp จาก Folder Bootstarpที่โหลดมา-->
    <link href="bootstrap-5.1.0-dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="bootstrap-5.1.0-dist/js/bootstrap.bundle.min.js"></script>

    <!-- เรียกใช้ Bootstarp จาก CDN (Content Delivery Network) (icon https://icons.getbootstrap.com)
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
     -->
</head>

<body>
    <form class="m-3">
        <h6>การสื่อสาร</h6>
        <div class="form-check form-switch">
            <input type="checkbox" class="form-check-input" id="swl">
            <label for="swl" class="form-label mb-1">Wi-Fi</label>
        </div>
        <div class="form-check form-switch">
            <input type="checkbox" class="form-check-input" id="sw2">
            <label for="sw2" class="form-label mb-1">Bluetooth</label>
        </div>
        <div class="form-check form-switch">
            <input type="checkbox" class="form-check-input" id="sw3">
            <label for="sw3" class="form-label mb-1">Cellular</label>
        </div>
    </form>
</body>

</html>
