<!DOCTYPE html>
<html lang="en">
   <head>
     <meta charset="UTF-8">
     <meta http-equiv="X-UA-Compatible" content="IE=edge">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Ass24 - Offcanvas (Bootstrap)</title>

    <!--เรียกใช้ Bootstarp จาก Folder Bootstarpที่โหลดมา-->
     <link href="bootstrap-5.1.0-dist/css/bootstrap.min.css" rel="stylesheet">
     <script src="bootstrap-5.1.0-dist/js/bootstrap.bundle.min.js"></script>

    <!-- เรียกใช้ Bootstarp จาก CDN (Content Delivery Network) (icon https://icons.getbootstrap.com)
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
     -->
    <script>
     //เรียกฟังก์ชันนี้เมื่อต้องการแสดง Offcanvas
      function showoffcanvas () {
       const ocv = document. getElementById ('offcanvasExample' )
       new bootstrap.Offcanvas(ocv).show() //ถ้าต้องการซ่อนใช้ hide ()
      }
    </script>
   </head>

  <body class="p-5">
   <!--
    <a href="#offcanvasExample" class="btn btn-primary" data-bs-toggle="offcanvas">
      Show Offcanvas
    </a>
    <button class="btn btn-primary" data-bs-toggle="offcanvas" data-bs-target="#offcanvasExample">
     Button with data-bs-target
    </button>
    <button class="btn btn-primary" onclick="showOffcanvas () ">
     Show Offcanvas (JS)
    </button>
    <div class="offcanvas offcanvas-bottom" id="offcanvasExample">
     <div class="offcanvas-header">
      <h5 class="offcanvas-title" id="offcanvasExampleLabel">Offcanvas</h5>
      <button class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
     </div>
     <div class="offcanvas-body">
      <div>
       เลื่อนออกจากขอบด้านบน <br>
       (offcanvas-bottom)
      </div>
     </div>
    </div>
   -->
   
   <button class="btn btn-primary" data-bs-toggle="offcanvas" data-bs-target="#offcanvasLeft">
     Show Offcanvas (Left)
   </button>
   <a href="#offcanvasRight" class="btn btn-primary" data-bs-toggle="offcanvas" >
     Show Offcanvas (Right)
   </a>
   <div class="offcanvas offcanvas-start" id="offcanvasLeft">
    <div class="offcanvas-header">
     <h5 class="offcanvas-title">DeveloperThai.com</h5>
     <button class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
     <div>
      <a href="#">Home</a><br>
      <a href="#">HTML5</a><br>
      <a href="#">css3</a><br>
      <a href="#">Bootstrap5</a><br>
     </div>
    </div>
   </div>

   <div class="offcanvas offcanvas-end" id="offcanvasRight">
    <div class="offcanvas-header">
     <h5 class="offcanvas-title">รายการสินค้าในรถเย็น</h5>
     <button class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
     <ul>
      <li>Vue.js</li>
      <li>React</li>
      <li>React Native</li>
     </ul>
    </div>
   </div>
 </body>
</html>
