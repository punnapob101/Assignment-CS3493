<!DOCTYPE html>
<html lang="en">
   <head>
     <meta charset="UTF-8">
     <meta http-equiv="X-UA-Compatible" content="IE=edge">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Ass14 - Button Group (Bootstrap)</title>

    <!--เรียกใช้ Bootstarp จาก Folder Bootstarpที่โหลดมา-->
     <link href="bootstrap-5.1.0-dist/css/bootstrap.min.css" rel="stylesheet">
     <script src="bootstrap-5.1.0-dist/js/bootstrap.bundle.min.js"></script>

    <!-- เรียกใช้ Bootstarp จาก CDN (Content Delivery Network) (icon https://icons.getbootstrap.com)
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
     -->
   </head>

 <body class="p-4">
  <div class="btn-group" role="group">
   <button class="btn btn-danger">Home</button>
   <input type="button" class="btn btn-danger" value="Docs">
   <a href="#" class="btn btn-danger" data-role="button">Download</a>
  </div>
  <br><br>

  <div class="btn-group-vertical" role="group">
   <button class="btn btn-outline-primary">Home</button>
   <input type="button" class="btn btn-outline-primary" value="Docs">
   <a href="#" class="btn btn-outline-primary" data-role="button">Download</a>
  </div>
 </body>
</html>
