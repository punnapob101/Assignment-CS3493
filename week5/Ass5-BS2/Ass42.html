<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale-1.0">
    <title>Ass42 - Navbar P.3 (Bootstarp)</title>

    <!--เรียกใช้ Bootstarp จาก Folder Bootstarpที่โหลดมา-->
    <link href="bootstrap-5.1.0-dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="bootstrap-5.1.0-dist/js/bootstrap.bundle.min.js"></script>

    <!-- เรียกใช้ Bootstarp จาก CDN (Content Delivery Network) (icon https://icons.getbootstrap.com)
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
     -->
</head>

<body>
    <nav class="navbar navbar-expand-sm navbar-light" style="background-color: powderblue">
        <!-- สิงที่ไม่ต้องการซ่อน ให้วางไว้ก่อนปุ่ม toggler -->
        <a class="navbar-brand" href="#">
            <img src="bootstrap.png" height="24" class="ms-2 mb-2">
            <span>Bootstrap</span>
        </a>
        <!-- ปุ่มนี้สำหรับแสดล็อตอนแฮมเบอร์เกอร์ เมื่อเมนูถูกซ่อน -->
        <button class="navbar-toggler me-2" data-bs-toggle="collapse" data-bs-target="#navbarToggler">
            <span class="navbar-toggler-icon"></span>
        </button>
        <!--
           สิ่งที่สามารถซ่อนและแสดงได้ ให้บรรจุไว้ใน Collapse
           โดยเชื่อมโยงกับปุ่มล็อตอนแอมเบอร์เกอร์ ด้วยค่า id
           ส่วนหลักการสร้างเมนู ก็เหมือนเดิมทั้งหมด
        -->
        <div class="collapse navbar-collapse mb-1" id="navbarToggler">
            <ul class="navbar-nav ms-3">
                <li class="nav-item active">
                    <a class="nav-link" href="#">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Documentation</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Download</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Help</a>
                </li>
            </ul>
        </div>
    </nav>
</body>
</html>
