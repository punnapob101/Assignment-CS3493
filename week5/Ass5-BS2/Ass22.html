<!DOCTYPE html>
<html lang="en">
   <head>
     <meta charset="UTF-8">
     <meta http-equiv="X-UA-Compatible" content="IE=edge">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Ass22 - Toasts P.1 (Bootstrap)</title>

    <!--เรียกใช้ Bootstarp จาก Folder Bootstarpที่โหลดมา-->
     <link href="bootstrap-5.1.0-dist/css/bootstrap.min.css" rel="stylesheet">
     <script src="bootstrap-5.1.0-dist/js/bootstrap.bundle.min.js"></script>

    <!-- เรียกใช้ Bootstarp จาก CDN (Content Delivery Network) (icon https://icons.getbootstrap.com)-->
     <!--<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">-->
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
     <!--<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>-->

    <script>
     function showToast (id) {
       const t = document.getElementById (id)
       new bootstrap.Toast(t).show()
     }
    </script>
   </head>

 <body class="p-4 text-center">
  <button class="btn btn-primary" onclick="showToast ('toast1') ">Show Toast @Bottom-Center</button>
  <button class="btn btn-primary" onclick="showToast ('toast2') ">Show Toast @Center-Center</button>

  <div id="toast1" class="toast position-fixed bottom-0 start-50 translate-middle-x mb-2">
   <div class="d-flex">
    <div class="toast-body">
     <span class="fs-6">นี่คิอข้อความของตอมโพเนนต์ Toast</span>
    </div>
    <button class="btn-close m-auto me-2" data-bs-dismiss="toast"></button>
   </div>
  </div>

  <div id="toast2" class="toast position-fixed top-50 start-50 translate-middle bg-warning" data-bs-autohide="false">
   <div class="d-flex">
    <div class="toast-body d-flex align-items-center">
     <i class="bi-exclamation-circle me-2" style="font-size: 24px; "></i>
     <span class="fs-6">ข้อความของตอมโพเนนต์ Toast</span>
    </div>
    <button class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
   </div>
  </div>
 </body>
</html>
