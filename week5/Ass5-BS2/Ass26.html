<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ass26 - Accordion P.1 (Bootstarp) </title>
    <!--เรียกใช้ Bootstarp จาก Folder Bootstarpที่โหลดมา-->
     <link href="bootstrap-5.1.0-dist/css/bootstrap.min.css" rel="stylesheet">
     <script src="bootstrap-5.1.0-dist/js/bootstrap.bundle.min.js"></script>

    <!-- เรียกใช้ Bootstarp จาก CDN (Content Delivery Network) (icon https://icons.getbootstrap.com)
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
     -->
</head>

<body class="p-3">
    <div class="accordion" id="accordionParent">
     <div class="accordion-item">
      <h2 class="accordion-header">
       <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#collapse1">
         HTML5
       </button>    
      </h2>
    <div id="collapse1" class="accordion-collapse collapse" data-bs-parent="#accordionParent">
     <div class="accordion-body">
       HTML (Hyper Text Markup Language) is the language for creating web page
     </div>
    </div>
   </div>
    <div class="accordion-item">
     <h2 class="accordion-header">
      <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#collapse2">
        C553
      </button>
     </h2>
    <div id="collapse2" class="accordion-collapse collapse" data-bs-parent="#accordionParent">
     <div class="accordion-body">
       CSS (Cascading Style Sheets) is the language for styling web page
     </div>
    </div>
   </div>

   <div class="accordion-item">
    <h2 class="accordion-header">
     <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#collapse3">
       Bootstrap5
     </button>
    </h2>
   <div id="collapse3" class="accordion-collapse collapse" data-bs-parent="#accordionParent">
     <div class="accordion-body">
       Bootstrap is the most popular frontend framework for styling responsive web page
     </div>
    </div>
   </div>
  </div>
 </body>
</html>
