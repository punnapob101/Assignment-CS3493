<!DOCTYPE html>
<html lang="en">
   <head>
     <meta charset="UTF-8">
     <meta http-equiv="X-UA-Compatible" content="IE=edge">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Ass23 - Toasts P.2 (Bootstrap)</title>

    <!--เรียกใช้ Bootstarp จาก Folder Bootstarpที่โหลดมา-->
     <link href="bootstrap-5.1.0-dist/css/bootstrap.min.css" rel="stylesheet">
     <script src="bootstrap-5.1.0-dist/js/bootstrap.bundle.min.js"></script>

    <!-- เรียกใช้ Bootstarp จาก CDN (Content Delivery Network) (icon https://icons.getbootstrap.com)-->
     <!--<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">-->
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
     <!--<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>-->

    <script>
      function showToast (id) {
       const t = document.getElementById(id)
       new bootstrap.Toast(t).show()
      }
    </script>
   </head>

  <body class="p-4 text-center">
   <button class="btn btn-primary" onclick="showToast ('toastTopLeft' ) ">Toast @Top-Left</button>
   <button class="btn btn-primary" onclick="showToast ('toastTopCenter' ) ">Toast @Top-Center</button>
   <button class="btn btn-primary" onclick="showToast ('toastTopRight' ) ">Toast @Top-Right</button><br><br>
   <button class="btn btn-primary" onclick="showToast ('toastCenterLeft' ) ">Toast @Center-Left</button>
   <button class="btn btn-primary" onclick="showToast ('toastCenterCenter' ) ">Toast @Center-Center</button>
   <button class="btn btn-primary" onclick="showToast ('toastCenterRight' ) ">Toast @Center-Right</button><br><br>
   <button class="btn btn-primary" onclick="showToast ('toastBottomLeft' ) ">Toast @Bottom-Left</button>
   <button class="btn btn-primary" onclick="showToast ('toastBottomCenter' ) ">Toast @Bottom Center</button>
   <button class="btn btn-primary" onclick="showToast ('toastBottomRight' ) ">Toast @Bottom Right</button>
 
   <div id="toastTopLeft" class="toast position-fixed top-0 start-0">
    <div class="d-flex">
      <div class="toast-body">
       <span class="fs-6">ข้อความของตอมโพเนนต์ Toast</span>
      </div>
     <button class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
   </div>

   <div id="toastTopCenter" class="toast position-fixed top-0 start-50 translate-middle-x bg-warning" data-bs-delay="7000">
    <div class="d-flex">
      <div class="toast-body">
       <span class="fs-6">ข้อความของคอมโพเนนต์ Toast</span>
      </div>
     <button class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
   </div>

   <div id="toastTopRight" class="toast position-fixed top-0 end-0">
    <div class="d-flex">
      <div class="toast-body">
       <span class="fs-6">ข้อความของคอมโพเนนต์ Toast</span>
      </div>
     <button class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
   </div>

   <div id="toastCenterLeft" class="toast position-fixed top-50 start-0 translate-middle-y">
    <div class="d-flex">
      <div class="toast-body">
       <span class="fs-6">ข้อความของคอมโพเนนต์ Toast</span>
      </div>
     <button class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
   </div>

   <div id="toastCenterCenter" class="toast position-fixed top-50 start-50 translate-middle bg-info" data-bs-autohide="false">
    <div class="d-flex">
      <div class="toast-body d-flex align-items-center">
       <i class="bi-exclamation-circle me-2" style="font-size: 24px; "></i>
       <span class="fs-6">ข้อความของคอมโพเนนต์ Toast</span>
      </div>
     <button class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
   </div>

   <div id="toastCenterRight" class="toast position-fixed top-50 end-0 translate-middle-y">
    <div class="d-flex">
      <div class="toast-body d-flex align-items-center">
       <span class="fs-6">ข้อความของคอมโพเนนต์ Toast</span>
      </div>
     <button class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
   </div>

   <div id="toastBottomLeft" class="toast position-fixed bottom-0 start-0" data-bs-autohide="true">
    <div class="d-flex">
      <div class="toast-body">
       <span class="fs-6">ข้อความของคอมโพเนนต์ Toast</span>
      </div>
     <button class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
   </div>

   <div id="toastBottomCenter" class="toast position-fixed bottom-0 start-50 translate-middle-x bg-secondary" data-bs-autohide="true">
    <div class="d-flex">
      <div class="toast-body d-flex align-items-center">
       <i class="bi-exclamation-circle me-2" style="color: white; font-size: 24px; "></i>
       <span class="fs-6 text-white">ข้อความของคอมโพเนนต์ Toast</span>
      </div>
     <button class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
   </div>

   <div id="toastBottomRight" class="toast position-fixed bottom-0 end-0" data-bs-autohide="true">
    <div class="d-flex">
      <div class="toast-body">
       <span class="fs-6">ข้อความของคอมโพเนนต์ Toast</span>
      </div>
     <button class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
   </div>
 </body>
</html>
