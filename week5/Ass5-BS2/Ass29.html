<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale-1.0">
    <title>Ass29 - Dropdown P.2 (Bootstarp)</title>

    <!--เรียกใช้ Bootstarp จาก Folder Bootstarpที่โหลดมา-->
    <link href="bootstrap-5.1.0-dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="bootstrap-5.1.0-dist/js/bootstrap.bundle.min.js"></script>

    <!-- เรียกใช้ Bootstarp จาก CDN (Content Delivery Network) (icon https://icons.getbootstrap.com)
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
     -->
</head>

<body class="p-4">
    <!-- Default dropend button -->
    <div class="btn-group dropend">
        <button type="button" class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown">
            Dropend
        </button>
        <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#">Angular</a></li>
            <li><a class="dropdown-item" href="#">React</a></li>
            <li><a class="dropdown-item" href="#">Vue</a></li>
        </ul>
    </div>

    <!-- Split dropend button -->
    <div class="btn-group dropend">
        <button type="button" class="btn btn-danger">
            Split dropend
        </button>
        <button type="button" class="btn btn-danger dropdown-toggle dropdown-toggle-split" data-bs-toggle="dropdown">
        </button>
        <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#">Angular</a></li>
            <li><a class="dropdown-item" href="#">React</a></li>
            <li><a class="dropdown-item" href="#">Vue</a></li>
        </ul>
    </div>

    <br><br>
    <!-- ให้ปุ่มไปอยู่ขอบด้านขวา เพื่อให้แสดงแผนด้านซ้าเได้ -->
    <div class="text-end">
        <!-- Default dropstart button -->
        <div class="btn-group dropstart">
            <button type="button" class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown">
                Dropstart
            </button>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Action</a></li>
                <li><a class="dropdown-item" href="#">Another action</a></li>
                <li><a class="dropdown-item" href="#">Something else here</a></li>
            </ul>
        </div>

        <!-- Split dropstart button-->
        <div class="btn-group">
            <div class="btn-group dropstart" role="group">
                <button class="btn btn-dark dropdown-toggle dropdown-toggle-split" data-bs-toggle="dropdown"></button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">Action</a></li>
                    <li><a class="dropdown-item" href="#">Another action</a></li>
                    <li><a class="dropdown-item" href="#">Something else here</a></li>
                </ul>
            </div>
            <button type="button" class="btn btn-dark">
                Split dropstart
            </button>
        </div>
    </div>

    <!-- dropup button -->
    <div class="btn-group dropup">
        <button class="btn btn-info dropdown-toggle" data-bs-toggle="dropdown">
            Dropup
        </button>
        <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#">Angular</a></li>
            <li><a class="dropdown-item" href="#">React</a></li>
            <li><a class="dropdown-item" href="#">Vue</a></li>
        </ul>
    </div>
    <!-- Split dropup button -->
    <div class="btn-group dropup">
        <button class="btn btn-secondary">
            Split dropup
        </button>
        <button class="btn btn-secondary dropdown-toggle dropdown-toggle-split" data-bs-toggle="dropdown">
        </button>
        <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#">Angular</a></li>
            <li><a class="dropdown-item" href="#">React</a></li>
            <li><a class="dropdown-item" href="#">Vue</a></li>
        </ul>
    </div>
</body>

</html>
