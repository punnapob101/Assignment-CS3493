<!DOCTYPE html>
<html lang="en">
   <head>
     <meta charset="UTF-8">
     <meta http-equiv="X-UA-Compatible" content="IE=edge">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Ass25 - Modal (Bootstrap)</title>
    <!--เรียกใช้ Bootstarp จาก Folder Bootstarpที่โหลดมา-->
     <link href="bootstrap-5.1.0-dist/css/bootstrap.min.css" rel="stylesheet">
     <script src="bootstrap-5.1.0-dist/js/bootstrap.bundle.min.js"></script>

    <!-- เรียกใช้ Bootstarp จาก CDN (Content Delivery Network) (icon https://icons.getbootstrap.com)
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
     -->
   </head>

  <body class="p-5 text-center">
   <!-- ปุ่มสำหรับเปิด Modal -->
    <button class="btn btn-primary d-inline-block" data-bs-toggle="modal" data-bs-target="#myModal">
      Show Modal
    </button>
   <!-- องค์ประกอบของ Modal -->
    <div id="myModal" class="modal">
    <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
    <div class="modal-header">
     <h5 class="modal-title">Bootstrap Modal</h5>
     <button class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <div class="modal-body text-start">
     Use Bootstrap's modal to add dialogs to your site for lightboxes,
     user notifications or completely custom content.
    </div>
    <div class="modal-footer">
     <button class="btn btn-primary">Share</button>
     <button class="btn btn-danger" data-bs-dismiss="modal">Close</button>
    </div>
   </div> 
   <!-- modal-content-->
</div> <!--modal-dialog-->
</div> <!-- modal-->

</body>
</html>
