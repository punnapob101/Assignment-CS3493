<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 11 - JavaScript Front-End 2</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #ecfeff 0%, #ffffff 100%);
            min-height: 100vh;
        }
    </style>
</head>

<body class="py-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

        <!-- Header Section -->
        <div class="text-center mb-12">
            <span
                class="inline-block py-1 px-3 rounded-full bg-cyan-100 text-cyan-700 text-sm font-bold tracking-wider mb-4 border border-cyan-200">
                WEEK 11 • ASSIGNMENT
            </span>
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 mb-4 tracking-tight">
                บทเรียน <span class="text-cyan-600">JavaScript Front-End 2</span>
            </h1>
            <p class="text-lg text-slate-600 max-w-2xl mx-auto">
                เลือกแบบฝึกหัดที่ต้องการเข้าดูจากปุ่มด้านล่าง
            </p>
        </div>

        <!-- Dynamic Button Grid -->
        <div id="button-grid"
            class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
            <!-- Buttons will be injected here via JavaScript -->
        </div>

        <!-- Back to Home Button -->
        <div class="mt-16 text-center">
            <a href="../../index.html"
                class="inline-flex items-center justify-center px-6 py-3 border border-slate-300 rounded-full shadow-sm text-base font-medium text-slate-700 bg-white hover:bg-slate-50 hover:text-cyan-600 transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cyan-500">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                กลับไปหน้าหลัก
            </a>
        </div>
    </div>

    <!-- Script to Generate Buttons for specific files -->
    <script>
        const grid = document.getElementById('button-grid');

        // รายชื่อไฟล์และหัวข้อทั้งหมดในโฟลเดอร์ Week 11
        const files = [
            { title: "Ass 1", file: "Ass1.html" },
            { title: "Ass 2", file: "Ass2.html" },
            { title: "Ass 3 - main1", file: "Ass3-main1.html" },
            { title: "Ass 4 - main2", file: "Ass4-main2.html" },
            { title: "Ass 5 - main3", file: "Ass5-main3.html" },
            { title: "Ass 6 - main4", file: "Ass6-main4.html" },
            { title: "Ass 7 - main5", file: "Ass7-main5.html" },
            { title: "Ass 8 - main6", file: "Ass8-main6.html" },
            { title: "Ass 9 - main7", file: "Ass9-main7.html" },
            { title: "Ass 10 - main8", file: "Ass10-main8.html" },
            { title: "Ass 11 - main9p1", file: "Ass11-main9p1.html" },
            { title: "Ass 12 - main9p2", file: "Ass12-main9p2.html" },
            { title: "Ass 13 - main9p3", file: "Ass13-main9p3.html" },
            { title: "Ass 14 - main9p4", file: "Ass14-main9p4.html" },
            { title: "Ass 15 - main10p1", file: "Ass15-main10p1.html" },
            { title: "Ass 16 - main10p2", file: "Ass16-main10p2.html" },
            { title: "Ass 17 - main10p3", file: "Ass17-main10p3.html" },
            { title: "Ass 18 - main11p1", file: "Ass18-main11p1.html" },
            { title: "Ass 19 - main11p2", file: "Ass19-main11p2.html" },
            { title: "Ass 20 - main12", file: "Ass20-main12.html" }
        ];

        files.forEach(item => {
            const a = document.createElement('a');
            a.href = item.file;
            a.className = "flex flex-col items-center justify-center p-4 bg-white rounded-xl shadow-sm border border-slate-200 hover:border-cyan-400 hover:shadow-md hover:text-cyan-600 text-slate-700 font-semibold text-center transition-all transform hover:-translate-y-1 group";

            a.innerHTML = `
                <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center mb-3 group-hover:bg-cyan-50 transition-colors">
                    <svg class="w-5 h-5 text-slate-400 group-hover:text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                    </svg>
                </div>
                <span class="text-sm leading-tight">${item.title}</span>
            `;

            grid.appendChild(a);
        });
    </script>
</body>

</html>
