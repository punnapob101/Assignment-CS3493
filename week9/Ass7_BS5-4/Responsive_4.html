<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale-1.0">
    <title>Responsive-4</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>

    <link href="bootstrap-5.1.0-dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="bootstrap-5.1.0-dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <!-- using gutter -->
    <form class="row g-3 p-4 mx-auto" style="max-width: 640px;">
        <div class="col-md-6">
            <label for="inputFname" class="form-label">ชื่อ</label>
            <input type="text" class="form-control" id="inputFname">
        </div>
        <div class="col-md-6">
            <label for="inputLname" class="form-label">นามสกุล</label>
            <input type="text" class="form-control" id="inputLname">
        </div>
        <div class="col-12">
            <label for="inputAddress" class="form-label">ที่อยู่ บรรทัด 1</label>
            <input type="text" class="form-control" id="inputAddress">
        </div>
        <div class="col-12">
            <label for="inputAddress2" class="form-label">ที่อยู่ บรรทัด 2</label>
            <input type="text" class="form-control" id="inputAddress2">
        </div>
        <div class="col-md-4">
            <label for="inputCity" class="form-label">อำเภอ</label>
            <input type="text" class="form-control" id="inputCity">
        </div>
        <div class="col-md-5">
            <label for="input Province" class="form-label">จังหวัด</label>
            <select id="inputProvince" class="form-select">
                <option>กรุงเทพ</option>
            </select>
        </div>
        <div class="col-md-3">
            <label for="inputZip" class="form-label">รหัสไปรษณีย์</label>
            <input type="text" class="form-control" id="inputZip">
        </div>
        <div class="col-md-5">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="check1">
                <label class="form-check-label" for="check1">
                    ยอมรับเงื่อนไขและข้อตกลง
                </label>
            </div>
        </div>
        <div class="col-md-5">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="check2">
                <label class="form-check-label" for="check2">
                    จัดเก็บข้อมูลไว้ในเครื่องนี้
                </label>
            </div>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary">ตกลง</button>
        </div>
    </form>
</body>

</html>
