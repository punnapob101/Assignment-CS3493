<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale-1.0">
    <title>Responsive-2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<style>
    a.menu {
        color: white;
        /* aqua; */
        display: block;
        margin-top: 7px;
        margin-left: 5px;
        padding: 5px;
        text-decoration: none;
    }

    a.menu:hover {
        color: blue;
        background-color: #ffc;
    }

    a.menu:active {
        color: red;
    }
</style>
</head>

<body>
    <div class="row vw-100 vh-100">
        <div class="col-auto col-md-auto bg-dark text-center text-md-start p-3">
            <a href="#" class="menu">
                <i class="bi-house-door"></i>
                <span class="d-none d-md-inline-block ms-1">Home</span>
            </a>
            <a href="#" class="menu">
                <i class="bi-basket"></i>
                <span class="d-none d-md-inline-block ms-1">Product</span>
            </a>
            <a href="#" class="menu">
                <i class="bi-person"></i>
                <span class="d-none d-md-inline-block ms-1">Member</span>
            </a>
            <a href="#" class="menu">
                <i class="bi-telephone"></i>
                <span class="d-none d-md-inline-block ms-1">Contact Us</span>
            </a>
        </div>
        <div class="col col-md">
            <h4 class="text-center mt-5">Content Area</h4>
        </div>
    </div>
</body>

</html>
