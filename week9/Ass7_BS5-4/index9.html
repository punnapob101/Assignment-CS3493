<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 9 - BS5 Grid & Responsive</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #ffffff 100%);
            min-height: 100vh;
        }
    </style>
</head>

<body class="py-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

        <!-- Header Section -->
        <div class="text-center mb-12">
            <span
                class="inline-block py-1 px-3 rounded-full bg-indigo-100 text-indigo-700 text-sm font-bold tracking-wider mb-4 border border-indigo-200">
                WEEK 9 • ASSIGNMENT
            </span>
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 mb-4 tracking-tight">
                บทเรียน<span class="text-indigo-600">Bootstrap 5 Grid</span>
            </h1>
            <p class="text-lg text-slate-600 max-w-2xl mx-auto">
                เลือกแบบฝึกหัดที่ต้องการเข้าดูจากปุ่มด้านล่าง
            </p>
        </div>

        <!-- Dynamic Button Grid -->
        <div id="button-grid"
            class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
            <!-- Buttons will be injected here via JavaScript -->
        </div>

        <!-- Back to Home Button -->
        <div class="mt-16 text-center">
            <a href="../../index.html"
                class="inline-flex items-center justify-center px-6 py-3 border border-slate-300 rounded-full shadow-sm text-base font-medium text-slate-700 bg-white hover:bg-slate-50 hover:text-indigo-600 transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                กลับไปหน้าหลัก
            </a>
        </div>
    </div>

    <!-- Script to Generate Buttons for specific files -->
    <script>
        const grid = document.getElementById('button-grid');

        // รายชื่อไฟล์และหัวข้อทั้งหมดในโฟลเดอร์ Week 9
        const files = [
            { title: "Breakout 1", file: "Breakout_1.html" },
            { title: "Breakout 2", file: "Breakout_2.html" },
            { title: "Breakout 3", file: "Breakout_3.html" },
            { title: "Breakout 4", file: "Breakout_4.html" },
            { title: "Breakout 5", file: "Breakout_5.html" },
            { title: "Breakout 6", file: "Breakout_6.html" },
            { title: "Breakout 7", file: "Breakout_7.html" },
            { title: "Breakout 8", file: "Breakout_8.html" },
            { title: "Grid 1", file: "Grid_1.html" },
            { title: "Grid 2", file: "Grid_2.html" },
            { title: "Grid 3", file: "Grid_3.html" },
            { title: "Gutter 1", file: "Gutter_1.html" },
            { title: "Gutter 2", file: "Gutter_2.html" },
            { title: "Responsive 1", file: "Responsive_1.html" },
            { title: "Responsive 2", file: "Responsive_2.html" },
            { title: "Responsive 3", file: "Responsive_3.html" },
            { title: "Responsive 3-1", file: "Responsive_3-1.html" },
            { title: "Responsive 4", file: "Responsive_4.html" },
            { title: "Responsive 4-1", file: "Responsive_4-1.html" }
        ];

        files.forEach(item => {
            const a = document.createElement('a');
            a.href = item.file;
            a.className = "flex flex-col items-center justify-center p-4 bg-white rounded-xl shadow-sm border border-slate-200 hover:border-indigo-400 hover:shadow-md hover:text-indigo-600 text-slate-700 font-semibold text-center transition-all transform hover:-translate-y-1 group";

            a.innerHTML = `
                <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center mb-3 group-hover:bg-indigo-50 transition-colors">
                    <svg class="w-5 h-5 text-slate-400 group-hover:text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path>
                    </svg>
                </div>
                <span class="text-sm leading-tight">${item.title}</span>
            `;

            grid.appendChild(a);
        });
    </script>
</body>

</html>
